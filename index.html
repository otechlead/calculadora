<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Wanderley Lopes Batista">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CALCULADORA COMPLETA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">

  <script src="calculadora.js"></script>
</head>

<body>

  <div class="funcao-cientifica" id="cientifica">
    <h2>Funções científicas</h2>
    <div class="teclado-cientifico">
      <button onclick="digitar('/100')" class="btn operador">%</button>
      <button onclick="digitar('3.14')" class="btn operador">π</button>
      <button onclick="digitarComPrompt('**', 'Insira valor do expoente', '2')" class="btn operador">x²</button>
      <button onclick="digitar('√')" class="btn operador">√</button>
    </div>
  </div>

  <div class="calculadora" id="principal">
    <div class="header-calculadora">
      <button class="btn-toggle" onclick="togglePainel('cientifica')" title="Funções Científicas">🔬</button>
      <h1 id="cabecalho">
        <div class="titulo">Calculadora</div>
      </h1>
      <button class="btn-toggle" onclick="togglePainel('historico')" title="Histórico">📜</button>
    </div>

    <input type="text" id="visor" onkeyup="verificarLetra()" placeholder="0">

    <div class="teclado">

      <button onclick="digitar('.')" class="btn ponto">.</button>
      <button onclick="apagaUltimoCaractere()" class="btn">←</button>
      <button onclick="limpar()" class="btn limpar">C</button>
      <button onclick="digitar('/')" class="btn operador">/</button>

      <button onclick="digitar('7')" class="btn">7</button>
      <button onclick="digitar('8')" class="btn">8</button>
      <button onclick="digitar('9')" class="btn">9</button>
      <button onclick="digitar('*')" class="btn operador">×</button>

      <button onclick="digitar('4')" class="btn">4</button>
      <button onclick="digitar('5')" class="btn">5</button>
      <button onclick="digitar('6')" class="btn">6</button>
      <button onclick="digitar('-')" class="btn operador">−</button>

      <button onclick="digitar('1')" class="btn">1</button>
      <button onclick="digitar('2')" class="btn">2</button>
      <button onclick="digitar('3')" class="btn">3</button>
      <button onclick="digitar('+')" class="btn operador">+</button>
      
      <button onclick="digitar('0')" class="btn zero">0</button>

      <button onclick="calcular()" class="btn igual grande">=</button>

    </div>
  </div>

  <div class="calculadora-historico" id="historico">
    <h2 class="titulo-historico">Histórico</h2>
  </div>

</body>

</html>
